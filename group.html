<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grouped List Manager</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; user-select: none; margin: 0; height: 100vh; display: flex; flex-direction: column; }
.main-layout { display: flex; flex: 1; overflow: hidden; }
#groups-container { flex: 1; padding: 20px; overflow-y: auto; }
#preview-panel { width: 300px; border-left: 2px solid #ccc; padding: 20px; overflow-y: auto; background: #fff; position: relative; min-width: 100px; }
#resizer { width: 5px; cursor: col-resize; background: #eee; border-left: 1px solid #ccc; border-right: 1px solid #ccc; }
#resizer:hover { background: #ddd; }
.group { border: 1px solid #ccc; padding: 10px; margin-bottom: 15px; background: #f9f9f9; position: relative; }
.group-header { font-weight: bold; margin-bottom: 10px; cursor: grab; display:flex; align-items:center; gap:10px; }
.item { padding: 5px; margin: 3px 0; background: #fff; border: 1px solid #ddd; cursor: grab; display: flex; justify-content: space-between; align-items: center; }
.item.selected { background-color: #e0f0ff; border-color: #007bff; }
.item-text { flex-grow: 1; }
.delete-btn { color: #ff4d4d; cursor: pointer; font-weight: bold; margin-left: 10px; padding: 0 5px; }
.delete-btn:hover { background: #fee; }
.convert-btn { color: #28a745; cursor: pointer; font-weight: bold; margin-left: 10px; padding: 0 5px; }
.convert-btn:hover { background: #efe; }
button { cursor:pointer; padding: 5px 10px; margin-right: 5px; }
.plus { font-weight:bold; font-size:18px; cursor:pointer; }

/* Selection Box */
#selection-box {
    position: fixed;
    border: 1px solid #007bff;
    background: rgba(0, 123, 255, 0.2);
    pointer-events: none;
    display: none;
    z-index: 1000;
}

/* Modal */
.modal-overlay {
    position: fixed;
    top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.5);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 2000;
}
.modal-content {
    background: white;
    padding: 20px;
    border-radius: 5px;
    width: 400px;
    display: flex;
    flex-direction: column;
}
.modal-content textarea {
    height: 200px;
    margin-bottom: 10px;
}
.modal-actions {
    display: flex;
    justify-content: flex-end;
}
</style>
</head>
<body oncontextmenu="return false;">

<h2>Grouped List Manager</h2>

<div style="margin-bottom: 20px;">
    <input type="file" id="fileInput" style="display:none">
    <button onclick="document.getElementById('fileInput').click()">Import TXT</button>
    <button onclick="exportTxt()">Export TXT</button>
    <button onclick="exportHtml()">Export HTML</button>
    <button onclick="addCustomGroup()">Add Custom Group</button>
    <button onclick="deleteEmptyGroups()">Delete Empty Groups</button>
    <button id="deleteSelectedBtn" onclick="deleteSelected()" style="display:none; color: white; background-color: #ff4d4d; border: none;">Delete Selected</button>
    <label for="groupLimitInput" style="margin-left: 10px;">Group Limit:</label>
    <input type="number" id="groupLimitInput" value="6" min="1" style="width: 50px;" onchange="updateGroupLimit()">
</div>

<div class="main-layout">
    <div id="groups-container">
        <div id="groups"></div>
    </div>
    <div id="resizer"></div>
    <div id="preview-panel">
        <h3>Preview</h3>
        <div id="preview-content">Select an item to see preview</div>
    </div>
</div>

<div id="selection-box"></div>

<div id="pasteModal" class="modal-overlay">
    <div class="modal-content">
        <h3>Paste Items</h3>
        <textarea id="pasteArea" placeholder="One item per line..."></textarea>
        <div class="modal-actions">
            <button onclick="closePasteModal()">Cancel</button>
            <button onclick="submitPaste()">Add Items</button>
        </div>
    </div>
</div>

<script>
let items = [];
let groups = [];
let groupLimit = 6;

function createItem(text) {
    return { id: crypto.randomUUID(), text: text };
}

function updateGroupLimit() {
    const input = document.getElementById('groupLimitInput');
    let val = parseInt(input.value);
    if (isNaN(val) || val < 1) val = 1;
    groupLimit = val;
    input.value = groupLimit;
    rebalanceAll();
}
let selectedIndices = new Set(); // Stores {gIndex, iIndex} as strings "g,i"
let currentTargetGroupIndex = null;
let previewTimeout = null;

function updatePreview() {
    if (previewTimeout) clearTimeout(previewTimeout);
    previewTimeout = setTimeout(_updatePreview, 100);
}

function _updatePreview() {
    const previewContent = document.getElementById('preview-content');
    if (selectedIndices.size === 0) {
        previewContent.innerHTML = 'Select an item to see preview';
        return;
    }

    // Get the first selected item for preview (most relevant)
    const sortedSelection = Array.from(selectedIndices).map(s => {
        const [g, i] = s.split(',').map(Number);
        return {g, i, val: groups[g].items[i]};
    }).sort((a,b) => a.g - b.g || a.i - b.i);

    const firstItem = sortedSelection[0];
    const itemValue = firstItem.val ? firstItem.val.text : null;

    if (!itemValue) return;

    // Check for TikTok URL pattern - more robust extraction
    const tiktokMatch = itemValue.match(/tiktok\.com\/(@?[^\/?#\s]+)/i);
    if (tiktokMatch) {
        let username = tiktokMatch[1];
        if (username.startsWith('@')) username = username.substring(1);
        
        previewContent.innerHTML = `<div><strong>Username:</strong> ${username}</div><div id="img-container">Searching for image...</div>`;
        
        const imgContainer = document.getElementById('img-container');
        const extensions = ['.jpg', '.jpeg', '.png', '.webp'];
        const variants = [username, username.toLowerCase(), username.toUpperCase()];
        const sources = [];
        
        variants.forEach(v => {
            extensions.forEach(ext => {
                sources.push(v + ext);
            });
        });

        let found = false;
        const tryLoad = (idx) => {
            if (idx >= sources.length) {
                if (!found) imgContainer.innerHTML = 'No image found for ' + username;
                return;
            }

            const img = new Image();
            img.onload = () => {
                found = true;
                imgContainer.innerHTML = '';
                img.style.maxWidth = '100%';
                imgContainer.appendChild(img);
            };
            img.onerror = () => tryLoad(idx + 1);
            img.src = sources[idx];
        };

        tryLoad(0);
    } else {
        previewContent.innerHTML = `<div><strong>Item:</strong> ${itemValue}</div><div>Not a recognized TikTok URL</div>`;
    }
}

// Resizer Logic
const resizer = document.getElementById('resizer');
const previewPanel = document.getElementById('preview-panel');
let isResizing = false;

resizer.addEventListener('mousedown', e => {
    isResizing = true;
    document.body.style.cursor = 'col-resize';
});

let lastResizerUpdate = 0;
document.addEventListener('mousemove', e => {
    if (isResizing) {
        const now = performance.now();
        if (now - lastResizerUpdate < 16) return; // ~60fps
        lastResizerUpdate = now;

        const width = window.innerWidth - e.clientX;
        if (width > 50 && width < window.innerWidth - 100) {
            previewPanel.style.width = width + 'px';
        }
    }
});

document.addEventListener('mouseup', () => {
    isResizing = false;
    document.body.style.cursor = 'default';
});

// Marquee Selection state
let isSelecting = false;
let startX, startY;
let cachedItemRects = [];
const selectionBox = document.getElementById('selection-box');

document.addEventListener('mousedown', e => {
    // If modal is open, don't do selection logic
    if (document.getElementById('pasteModal').style.display === 'flex') return;

    // Detect what we clicked on
    const item = e.target.closest('.item');
    const header = e.target.closest('.group-header');
    const plus = e.target.closest('.plus');
    const btn = e.target.closest('button');

    // If clicking on an item, handle individual selection
    if (item && e.button === 0) {
        const key = `${item.dataset.gindex},${item.dataset.iindex}`;
        if (e.ctrlKey || e.shiftKey) {
            if (selectedIndices.has(key)) {
                selectedIndices.delete(key);
                item.classList.remove('selected');
            } else {
                selectedIndices.add(key);
                item.classList.add('selected');
            }
        } else {
            if (!selectedIndices.has(key)) {
                // Clear others
                document.querySelectorAll('.item.selected').forEach(el => el.classList.remove('selected'));
                selectedIndices.clear();
                selectedIndices.add(key);
                item.classList.add('selected');
            }
        }
        document.getElementById('deleteSelectedBtn').style.display = selectedIndices.size > 0 ? 'inline-block' : 'none';
        updatePreview();
        return;
    }

    // If clicking on header/buttons, let standard behavior (drag/click) happen
    if (header || plus || btn) return;

    // Only start marquee selection if it's from the left margin (first 100px)
    if (e.clientX < 100 && e.button === 0) {
        e.preventDefault();
        isSelecting = true;
        startX = e.clientX;
        startY = e.clientY;
        selectionBox.style.left = startX + 'px';
        selectionBox.style.top = startY + 'px';
        selectionBox.style.width = '0px';
        selectionBox.style.height = '0px';
        selectionBox.style.display = 'block';
        
        // Cache positions
        cachedItemRects = Array.from(document.querySelectorAll('.item')).map(div => ({
            rect: div.getBoundingClientRect(),
            g: div.dataset.gindex,
            i: div.dataset.iindex,
            div: div
        }));

        // Clear selection unless Shift key is held (optional)
        if (!e.shiftKey) {
            selectedIndices.clear();
            // render(); // Avoid full render if possible
            cachedItemRects.forEach(item => item.div.classList.remove('selected'));
        }
    }
});

let lastSelectionUpdate = 0;
document.addEventListener('mousemove', e => {
    if (!isSelecting) return;

    const now = performance.now();
    if (now - lastSelectionUpdate < 16) return; // ~60fps
    lastSelectionUpdate = now;
    
    const curX = e.clientX;
    const curY = e.clientY;
    
    const x = Math.min(startX, curX);
    const y = Math.min(startY, curY);
    const width = Math.abs(curX - startX);
    const height = Math.abs(curY - startY);
    
    selectionBox.style.left = x + 'px';
    selectionBox.style.top = y + 'px';
    selectionBox.style.width = width + 'px';
    selectionBox.style.height = height + 'px';
    
    updateSelection(x, y, width, height);
}, { passive: false });

document.addEventListener('mouseup', () => {
    if (!isSelecting) return;
    isSelecting = false;
    selectionBox.style.display = 'none';
    document.getElementById('deleteSelectedBtn').style.display = selectedIndices.size > 0 ? 'inline-block' : 'none';
});

document.addEventListener('keydown', e => {
    if ((e.key === 'Delete' || e.key === 'Backspace') && selectedIndices.size > 0) {
        if (document.activeElement.tagName !== 'TEXTAREA' && document.activeElement.tagName !== 'INPUT') {
            deleteSelected();
        }
    }
});

function updateSelection(bx, by, bw, bh) {
    let changed = false;
    
    cachedItemRects.forEach(item => {
        const rect = item.rect;
        const key = `${item.g},${item.i}`;
        
        // Check intersection
        const intersects = !(rect.left > bx + bw || 
                             rect.right < bx || 
                             rect.top > by + bh || 
                             rect.bottom < by);
        
        const isSelected = selectedIndices.has(key);
        if (intersects && !isSelected) {
            selectedIndices.add(key);
            item.div.classList.add('selected');
            changed = true;
        } else if (!intersects && isSelected) {
            selectedIndices.delete(key);
            item.div.classList.remove('selected');
            changed = true;
        }
    });
    
    if (changed) {
        document.getElementById('deleteSelectedBtn').style.display = selectedIndices.size > 0 ? 'inline-block' : 'none';
        updatePreview();
    }
}

function smartParse(rawLines) {
    const result = [];
    let currentGroup = null;

    rawLines.forEach(line => {
        const trimmed = line.trim();
        if (!trimmed) return;

        if (/^Group/i.test(trimmed)) {
            currentGroup = { name: trimmed, items: [], isCustom: true };
            result.push(currentGroup);
        } else {
            if (!currentGroup) {
                currentGroup = { name: 'TEMP', items: [], isCustom: false };
                result.push(currentGroup);
            }
            currentGroup.items.push(createItem(trimmed));
        }
    });
    return result;
}

function loadFile(file, targetGroupIndex=null) {
    const reader = new FileReader();
    reader.onload = function(e) {
        const rawLines = e.target.result.split(/\r?\n/).filter(x => x.trim());
        
        if (targetGroupIndex === null) {
            const parsed = smartParse(rawLines);
            // Merge into existing groups
            parsed.forEach(pg => {
                if (!pg.isCustom) {
                    // Find or create a standard group to put these items in
                    let lastGroup = groups[groups.length - 1];
                    if (lastGroup && !lastGroup.isCustom) {
                        lastGroup.items = lastGroup.items.concat(pg.items);
                    } else {
                        groups.push({ name: 'TEMP', items: pg.items, isCustom: false });
                    }
                } else {
                    groups.push(pg);
                }
            });
            rebalanceAll();
        } else {
            const newItems = rawLines.filter(line => !/^Group/i.test(line));
            insertIntoGroup(targetGroupIndex, newItems);
        }
    };
    reader.readAsText(file);
}

document.getElementById('fileInput').addEventListener('change', function(e) {
    loadFile(e.target.files[0]);
});

function rebuildGroups() {
    groups = [];
    let count = 1;
    const limit = Math.max(1, groupLimit);
    for (let i = 0; i < items.length; i += limit) {
        groups.push({ name: 'Group ' + String(count).padStart(2,'0'), items: items.slice(i, i+limit), isCustom: false });
        count++;
    }
    render();
}

function renumberGroups() {
    let count = 1;
    groups.forEach(g => {
        if (!g.isCustom) {
            g.name = 'Group ' + String(count).padStart(2,'0');
            count++;
        }
    });
}

function insertIntoGroup(gIndex, newItems) {
    const itemsToAdd = newItems.map(text => createItem(text));
    groups[gIndex].items = groups[gIndex].items.concat(itemsToAdd);
    rebalanceAll();
}

function rebalanceAll() {
    const limit = Math.max(1, groupLimit);
    // Collect all items from non-custom groups into a pool
    let standardPool = [];
    
    // Find all standard groups and collect their items
    for (let i = 0; i < groups.length; i++) {
        if (!groups[i].isCustom) {
            standardPool.push(...groups[i].items);
            groups[i].items = []; // Clear for refilling
        }
    }

    // Refill standard groups
    let poolPtr = 0;
    let lastStandardIdx = -1;

    for (let i = 0; i < groups.length; i++) {
        if (!groups[i].isCustom) {
            groups[i].items = standardPool.slice(poolPtr, poolPtr + limit);
            poolPtr += limit;
            lastStandardIdx = i;
        }
    }

    // Remove empty standard groups (except maybe the last one if we want to keep at least one?)
    groups = groups.filter((g, idx) => g.isCustom || g.items.length > 0 || idx === lastStandardIdx);

    // If there are still items in the pool, add more standard groups
    while (poolPtr < standardPool.length) {
        groups.push({
            name: 'TEMP', // will be renumbered
            items: standardPool.slice(poolPtr, poolPtr + limit),
            isCustom: false
        });
        poolPtr += limit;
    }
    
    renumberGroups();
    selectedIndices.clear();
    render();
    updatePreview();
}

function addCustomGroup() {
    const name = prompt("Enter group heading:");
    if (name) {
        groups.push({ name: name, items: [], isCustom: true });
        render();
    }
}

function deleteGroup(gIndex) {
    if (confirm(`Are you sure you want to delete "${groups[gIndex].name}"?`)) {
        groups.splice(gIndex, 1);
        rebalanceAll();
    }
}

function renameGroup(gIndex) {
    const newName = prompt("Enter new group name:", groups[gIndex].name);
    if (newName !== null && newName.trim() !== "") {
        groups[gIndex].name = newName.trim();
        groups[gIndex].isCustom = true;
        render();
    }
}

function deleteEmptyGroups() {
    groups = groups.filter(g => g.items.length > 0);
    rebalanceAll();
}

function deleteItem(gIndex, iIndex) {
    groups[gIndex].items.splice(iIndex, 1);
    rebalanceAll();
}

function convertToGroup(gIndex, iIndex) {
    const item = groups[gIndex].items[iIndex];
    groups.push({ name: item.text, items: [], isCustom: true });
    groups[gIndex].items.splice(iIndex, 1);
    rebalanceAll();
}

function deleteSelected() {
    if (selectedIndices.size === 0) return;
    
    // Convert set to array of objects, sort descending to splice without index shift issues
    const toDelete = Array.from(selectedIndices).map(s => {
        const [g, i] = s.split(',').map(Number);
        return {g, i};
    });
    
    // We need to delete from the end of the flattened list to be safe, 
    // or just rebalance after removing them from the respective groups.
    // Easier: just remove them from their groups and rebalance.
    
    // Sort by group index then item index, both descending
    toDelete.sort((a, b) => b.g - a.g || b.i - a.i);
    
    toDelete.forEach(d => {
        groups[d.g].items.splice(d.i, 1);
    });
    
    selectedIndices.clear();
    rebalanceAll();
    updatePreview();
}

function openPasteModal(gIndex) {
    currentTargetGroupIndex = gIndex;
    document.getElementById('pasteArea').value = '';
    document.getElementById('pasteModal').style.display = 'flex';
    document.getElementById('pasteArea').focus();
}

function closePasteModal() {
    document.getElementById('pasteModal').style.display = 'none';
}

function submitPaste() {
    const text = document.getElementById('pasteArea').value;
    if (text) {
        const rawLines = text.split(/\n/).filter(x => x.trim());

        if (currentTargetGroupIndex === null) {
            const parsed = smartParse(rawLines);
            parsed.forEach(pg => {
                if (!pg.isCustom) {
                    let lastGroup = groups[groups.length - 1];
                    if (lastGroup && !lastGroup.isCustom) {
                        lastGroup.items = lastGroup.items.concat(pg.items);
                    } else {
                        groups.push({ name: 'TEMP', items: pg.items, isCustom: false });
                    }
                } else {
                    groups.push(pg);
                }
            });
            rebalanceAll();
        } else {
            const newItems = rawLines.filter(line => !/^Group/i.test(line));
            insertIntoGroup(currentTargetGroupIndex, newItems);
        }
    }
    closePasteModal();
}

function render() {
    const container = document.getElementById('groups');
    const fragment = document.createDocumentFragment();

    groups.forEach((group, gIndex) => {
        const gDiv = document.createElement('div');
        gDiv.className = 'group';
        gDiv.draggable = true;
        gDiv.ondragstart = e => {
            e.dataTransfer.setData('group', gIndex);
        };
        gDiv.ondragover = e => {
            e.preventDefault();
            if (e.dataTransfer.types.includes('group')) {
                const rect = gDiv.getBoundingClientRect();
                const relY = e.clientY - rect.top;
                if (relY < rect.height / 2) {
                    gDiv.style.borderTop = '4px solid blue';
                    gDiv.style.borderBottom = '1px solid #ccc';
                } else {
                    gDiv.style.borderTop = '1px solid #ccc';
                    gDiv.style.borderBottom = '4px solid blue';
                }
            } else {
                gDiv.style.background = '#eef';
            }
        };
        gDiv.ondragleave = e => {
            gDiv.style.background = '#f9f9f9';
            gDiv.style.borderTop = '1px solid #ccc';
            gDiv.style.borderBottom = '1px solid #ccc';
        };
        gDiv.ondrop = e => {
            gDiv.style.background = '#f9f9f9';
            gDiv.style.borderTop = '1px solid #ccc';
            gDiv.style.borderBottom = '1px solid #ccc';

            const groupFrom = e.dataTransfer.getData('group');
            const itemData = e.dataTransfer.getData('item');
            const multiData = e.dataTransfer.getData('items-multi');

            if (groupFrom !== '') {
                const from = parseInt(groupFrom);
                const moved = groups.splice(from,1)[0];
                
                const rect = gDiv.getBoundingClientRect();
                const relY = e.clientY - rect.top;
                let targetIdx = gIndex;
                if (relY >= rect.height / 2) targetIdx++;
                
                // If we moved it from a lower index to a higher target, the index shifted
                if (from < targetIdx) targetIdx--;

                groups.splice(targetIdx,0,moved);
                renumberGroups();
                render();
            } else if (multiData) {
                const itemsToMove = JSON.parse(multiData);
                // Sort to keep original relative order
                itemsToMove.sort((a,b) => a.g - b.g || a.i - b.i);
                const values = itemsToMove.map(m => m.val);
                
                // Remove (descending)
                const itemsToRemove = [...itemsToMove].sort((a,b) => b.g - a.g || b.i - a.i);
                itemsToRemove.forEach(m => groups[m.g].items.splice(m.i, 1));

                groups[gIndex].items.push(...values);
                selectedIndices.clear();
                render();
                updatePreview();
            } else if (itemData) {
                const {gIndex: fromG, iIndex: fromI} = JSON.parse(itemData);
                const moved = groups[fromG].items.splice(fromI, 1)[0];
                groups[gIndex].items.push(moved);
                selectedIndices.clear();
                render();
                updatePreview();
            }
        };

        const header = document.createElement('div');
        header.className = 'group-header';

        const plus = document.createElement('span');
        plus.className = 'plus';
        plus.textContent = '+';

        plus.onclick = () => {
            openPasteModal(gIndex);
        };

        const title = document.createElement('span');
        title.textContent = group.name;
        title.style.flexGrow = '1';
        title.style.cursor = 'pointer';
        title.title = "Click to rename";
        title.onclick = (e) => {
            e.stopPropagation();
            renameGroup(gIndex);
        };

        const groupDelBtn = document.createElement('span');
        groupDelBtn.className = 'delete-btn';
        groupDelBtn.textContent = '×';
        groupDelBtn.onclick = (e) => {
            e.stopPropagation();
            deleteGroup(gIndex);
        };

        header.appendChild(plus);
        header.appendChild(title);
        header.appendChild(groupDelBtn);
        gDiv.appendChild(header);

        group.items.forEach((item, iIndex) => {
            const div = document.createElement('div');
            div.className = 'item';
            if (selectedIndices.has(`${gIndex},${iIndex}`)) {
                div.classList.add('selected');
            }
            div.draggable = true;

            const textSpan = document.createElement('span');
            textSpan.className = 'item-text';
            textSpan.textContent = item.text;
            div.appendChild(textSpan);

            const controls = document.createElement('div');
            controls.style.display = 'flex';
            controls.style.alignItems = 'center';

            const convBtn = document.createElement('span');
            convBtn.className = 'convert-btn';
            convBtn.textContent = '⊞';
            convBtn.title = 'Convert to Group';
            convBtn.onclick = (e) => {
                e.stopPropagation();
                convertToGroup(gIndex, iIndex);
            };
            controls.appendChild(convBtn);

            const delBtn = document.createElement('span');
            delBtn.className = 'delete-btn';
            delBtn.textContent = '×';
            delBtn.onclick = (e) => {
                e.stopPropagation();
                deleteItem(gIndex, iIndex);
            };
            controls.appendChild(delBtn);
            div.appendChild(controls);

            div.dataset.gindex = gIndex;
            div.dataset.iindex = iIndex;

            div.ondragstart = e => {
                e.stopPropagation();
                
                let dragItems = [];
                if (selectedIndices.has(`${gIndex},${iIndex}`)) {
                    // Moving all selected items
                    const sortedSelected = Array.from(selectedIndices).map(s => {
                        const [g, i] = s.split(',').map(Number);
                        return {g, i, val: groups[g].items[i]};
                    });
                    // We should probably preserve some order, but rebalance will squash them anyway.
                    // Just send the list of what to move.
                    dragItems = sortedSelected;
                } else {
                    // Dragging just this one
                    dragItems = [{g: gIndex, i: iIndex, val: groups[gIndex].items[iIndex]}];
                }
                
                e.dataTransfer.setData('items-multi', JSON.stringify(dragItems));
                // fallback for single item logic if needed, but we'll upgrade drop to handle multi
                e.dataTransfer.setData('item', JSON.stringify({gIndex, iIndex}));
            };

            div.ondragover = e => {
                e.preventDefault();
                e.stopPropagation();
                const rect = div.getBoundingClientRect();
                const relY = e.clientY - rect.top;
                if (relY < rect.height / 2) {
                    div.style.borderTop = '2px solid blue';
                    div.style.borderBottom = '1px solid #ddd';
                } else {
                    div.style.borderTop = '1px solid #ddd';
                    div.style.borderBottom = '2px solid blue';
                }
            };

            div.ondragleave = e => {
                div.style.borderTop = '1px solid #ddd';
                div.style.borderBottom = '1px solid #ddd';
            };

            div.ondrop = e => {
                e.stopPropagation();
                div.style.borderTop = '1px solid #ddd';
                div.style.borderBottom = '1px solid #ddd';
                
                const multiData = e.dataTransfer.getData('items-multi');
                if (multiData) {
                    const itemsToMove = JSON.parse(multiData);
                    // Crucial: preserve document order during move
                    itemsToMove.sort((a,b) => a.g - b.g || a.i - b.i);
                    const values = itemsToMove.map(m => m.val);

                    // Remove items from groups (descending to avoid index shift)
                    const itemsToRemove = [...itemsToMove].sort((a,b) => b.g - a.g || b.i - a.i);
                    itemsToRemove.forEach(m => groups[m.g].items.splice(m.i, 1));
                    
                    // Find where to insert
                    const rect = div.getBoundingClientRect();
                    const relY = e.clientY - rect.top;
                    let insertAfter = relY >= rect.height / 2;
                    
                    // The iIndex might have shifted if we removed items from the SAME group before this item.
                    // We'll use the unique ID to find its new index.
                    let currentTargetIdx = groups[gIndex].items.findIndex(i => i.id === item.id);
                    
                    if (currentTargetIdx === -1) {
                        // fallback to original iIndex adjusted for removals in same group
                        let countBefore = 0;
                        itemsToMove.forEach(m => {
                            if (m.g === gIndex && m.i < iIndex) countBefore++;
                        });
                        currentTargetIdx = iIndex - countBefore;
                    }

                    if (insertAfter) currentTargetIdx++;
                    groups[gIndex].items.splice(currentTargetIdx, 0, ...values);
                    
                    selectedIndices.clear();
                    render();
                    updatePreview();
                }
            };

            gDiv.appendChild(div);
        });

        fragment.appendChild(gDiv);
    });
    
    container.innerHTML = '';
    container.appendChild(fragment);
    
    document.getElementById('deleteSelectedBtn').style.display = selectedIndices.size > 0 ? 'inline-block' : 'none';
}

function exportTxt() {
    let output = '';
    groups.forEach(g => {
        output += g.name + '\n';
        g.items.forEach(i => output += i.text + '\n');
        output += '\n';
    });

    const blob = new Blob([output], {type: 'text/plain'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'output.txt';
    a.click();
}

function escapeHtml(text) {
    const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
    };
    return text.replace(/[&<>"']/g, function(m) { return map[m]; });
}

function exportHtml() {
    let html = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Groups</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; line-height: 1.6; }
        h3 { border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-top: 30px; display: flex; align-items: center; gap: 15px; }
        ul { list-style-type: none; padding-left: 0; }
        li { margin-bottom: 5px; }
        a { color: #007bff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        button { cursor: pointer; padding: 5px 10px; }
    </style>
    <script>
        function openGroup(links) {
            if (!links || links.length === 0) return;
            
            links.forEach(function(url, i) {
                setTimeout(function() {
                    var a = document.createElement('a');
                    a.href = url;
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                }, i * 800); // increased delay to 800ms
            });
        }
    <\/script>
</head>
<body>
    <h2>Link Groups Export</h2>
`;

    groups.forEach(group => {
        const escapedGroupName = escapeHtml(group.name);
        const links = group.items.filter(i => i.text.startsWith('http')).map(i => i.text);

        html += `    <h3>${escapedGroupName} <button onclick='openGroup(JSON.parse(this.dataset.links))' data-links='${escapeHtml(JSON.stringify(links))}'>Open All</button></h3>\n`;
        html += `    <ul>\n`;

        group.items.forEach(item => {
            const link = item.text;
            const escaped = escapeHtml(link);
            if (link.startsWith('http')) {
                html += `        <li><a href="${escaped}" target="_blank">${escaped}</a></li>\n`;
            } else {
                html += `        <li>${escaped}</li>\n`;
            }
        });

        html += `    </ul>\n`;
    });

    html += `</body>\n</html>`;

    const blob = new Blob([html], {type: 'text/html'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'output.html';
    a.click();
}
</script>
